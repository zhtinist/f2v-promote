{{template "base" .}}

{{define "page_title"}}作者管理{{end}}

{{define "content"}}
<div x-data="authorsPage()" x-init="init()">
  <div class="filter-bar">
      <div class="form-group filter-select">
        <label>账号</label>
        <select x-model="accountId" @change="page=1; loadAuthors()">
          <option value="">全部账号</option>
          <template x-for="a in accounts" :key="a.id">
            <option :value="a.id" x-text="a.name"></option>
          </template>
        </select>
      </div>
      <div class="filter-actions">
        <button @click="refresh()" class="btn btn-primary btn-sm" :disabled="!accountId || refreshing">
          <span x-show="!refreshing">刷新作者列表</span>
          <span x-show="refreshing"><span class="spinner"></span> 拉取中...</span>
        </button>
      </div>
  </div>
  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>头像</th>
            <th>昵称</th>
            <th>Username</th>
            <th>平台</th>
            <th>缓存时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="a in authors" :key="a.id">
            <tr>
              <td><img :src="a.avatar_url || '/static/img/default-avatar.png'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" alt=""></td>
              <td x-text="a.nickname || '-'"></td>
              <td class="mono" x-text="a.username || '-'"></td>
              <td><span class="status-tag status-active" x-text="platformName(a.platform)"></span></td>
              <td class="text-muted text-sm" x-text="fmtDate(a.cached_at)"></td>
              <td><button @click="openDetail(a)" class="btn btn-outline btn-xs">详情</button></td>
            </tr>
          </template>
          <tr x-show="authors.length === 0">
            <td colspan="6" class="empty-row" x-text="accountId ? '暂无作者，点击刷新获取' : '请先选择账号或查看全部'"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" x-show="total > 0">
      <div class="pagination-left">
        <span x-text="`共 ${total} 条`"></span>
        <select class="page-size-select" x-model.number="pageSize" @change="page=1; loadAuthors()">
          <option value="20">20 条/页</option>
          <option value="50">50 条/页</option>
          <option value="100">100 条/页</option>
        </select>
      </div>
      <div class="pagination-center">
        <button class="page-btn" :disabled="page <= 1" @click="goPage(1)">«</button>
        <button class="page-btn" :disabled="page <= 1" @click="goPage(page - 1)">‹</button>
        <template x-for="p in pagesArray()" :key="p">
          <button class="page-btn" :class="p === page ? 'page-btn-active' : (p === '...' ? 'page-btn-ellipsis' : '')" :disabled="p === '...'" @click="p !== '...' && goPage(p)" x-text="p"></button>
        </template>
        <button class="page-btn" :disabled="page >= totalPages" @click="goPage(page + 1)">›</button>
        <button class="page-btn" :disabled="page >= totalPages" @click="goPage(totalPages)">»</button>
      </div>
      <div class="pagination-right">
        <span>跳至</span>
        <input type="number" class="page-jump-input" min="1" :max="totalPages" @keyup.enter="jumpPage($event)">
        <span>页</span>
      </div>
    </div>
  </div>

  <!-- 详情抽屉 -->
  <div class="drawer-overlay" x-show="detailOpen" x-transition.opacity @click="detailOpen = false" x-cloak></div>
  <div class="drawer" :class="detailOpen ? 'drawer-open' : ''" x-cloak>
    <div class="drawer-header">
      <div class="drawer-title">作者详情</div>
      <button class="drawer-close" @click="detailOpen = false">&times;</button>
    </div>
    <div class="drawer-body" x-show="detail">
      <div class="detail-group">
        <div class="detail-group-title">基本信息</div>
        <div class="detail-row">
          <span class="detail-label">ID</span>
          <span class="detail-value" x-text="detail?.id"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">昵称</span>
          <span class="detail-value" x-text="detail?.nickname"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Username</span>
          <span class="detail-value mono" x-text="detail?.username"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">平台</span>
          <span class="detail-value" x-text="platformName(detail?.platform)"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">账号ID</span>
          <span class="detail-value" x-text="detail?.account_id"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">飞书同步</span>
          <span class="detail-value">
            <span class="status-tag" :class="detail?.feishu_sync_enabled ? 'status-active' : 'status-closed'" x-text="detail?.feishu_sync_enabled ? '已启用' : '未启用'"></span>
          </span>
        </div>
        <div class="detail-row">
          <span class="detail-label">飞书文件夹</span>
          <span class="detail-value mono" x-text="detail?.feishu_folder_token || '-'"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">缓存时间</span>
          <span class="detail-value" x-text="fmtDate(detail?.cached_at)"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">创建时间</span>
          <span class="detail-value" x-text="fmtDate(detail?.created_at)"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">更新时间</span>
          <span class="detail-value" x-text="fmtDate(detail?.updated_at)"></span>
        </div>
      </div>
      <div x-show="detail?.raw_data">
        <div class="section-title">原始数据</div>
        <pre class="code-block" x-text="JSON.stringify(detail?.raw_data, null, 2)"></pre>
      </div>
    </div>
  </div>


</div>
{{end}}

{{define "scripts"}}
<script>
function authorsPage() {
  return {
    accounts: [],
    accountId: '',
    authors: [],
    total: 0,
    page: 1,
    pageSize: 20,
    refreshing: false,
    detailOpen: false,
    detail: null,

    get totalPages() { return Math.max(1, Math.ceil(this.total / this.pageSize)); },

    async init() {
      this.initFromURL();
      await this.loadAccounts();
      await this.loadAuthors();
    },

    initFromURL() {
      const p = new URLSearchParams(window.location.search);
      this.page = Math.max(1, parseInt(p.get('page')) || 1);
      if (p.get('page_size')) this.pageSize = parseInt(p.get('page_size')) || 20;
      if (p.get('account_id')) this.accountId = p.get('account_id');
    },

    syncURL() {
      const p = new URLSearchParams();
      p.set('page', this.page);
      p.set('page_size', this.pageSize);
      if (this.accountId) p.set('account_id', this.accountId);
      history.replaceState(null, '', window.location.pathname + '?' + p.toString());
    },

    async loadAccounts() {
      try {
        const res = await fetch('/zhuge/accounts?page=1&page_size=100');
        const data = await res.json();
        this.accounts = data.list || [];
      } catch (e) {}
    },

    async loadAuthors() {
      try {
        let url;
        if (this.accountId) {
          url = `/zhuge/accounts/${this.accountId}/authors?page=${this.page}&page_size=${this.pageSize}`;
        } else {
          url = `/zhuge/authors?page=${this.page}&page_size=${this.pageSize}`;
        }
        const res = await fetch(url);
        const data = await res.json();
        this.authors = data.list || [];
        this.total = data.total || 0;
        this.syncURL();
      } catch (e) {}
    },

    async refresh() {
      if (!this.accountId) return;
      this.refreshing = true;
      try {
        const res = await fetch(`/zhuge/accounts/${this.accountId}/refresh-authors`, { method: 'POST' });
        if (!res.ok) { const e = await res.json(); throw new Error(e.error || '刷新失败'); }
        const data = await res.json();
        this.showToast(`已刷新，共 ${data.count} 个作者`);
        this.page = 1;
        await this.loadAuthors();
      } catch (e) { this.showToast('错误: ' + e.message); }
      finally { this.refreshing = false; }
    },

    openDetail(a) { this.detail = a; this.detailOpen = true; },

    goPage(p) { if (p >= 1 && p <= this.totalPages) { this.page = p; this.loadAuthors(); } },
    jumpPage(e) { const v = parseInt(e.target.value); if (v >= 1 && v <= this.totalPages) { this.page = v; this.loadAuthors(); } e.target.value = ''; },

    pagesArray() { return pageList(this.page, this.totalPages); },

    showToast(msg) { Alpine.store('toast').show(msg); }
  };
}
</script>
{{end}}
